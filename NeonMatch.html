<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON MATCH — Memory Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05060f;
    --bg2: #0a0d1f;
    --cyan: #00f5ff;
    --magenta: #ff00c8;
    --yellow: #ffe600;
    --green: #00ff88;
    --card-back: #0d1230;
    --card-border: #1a2460;
    --glow-cyan: 0 0 8px #00f5ff, 0 0 20px #00f5ff44;
    --glow-mag: 0 0 8px #ff00c8, 0 0 20px #ff00c844;
    --glow-green: 0 0 8px #00ff88, 0 0 20px #00ff8844;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Horizon glow */
  .horizon {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 220px;
    background: radial-gradient(ellipse 80% 100% at 50% 120%, rgba(255,0,200,0.18) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 740px;
    padding: 24px 16px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    width: 100%;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 8vw, 3.4rem);
    letter-spacing: 0.12em;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(0,245,255,0.5));
    line-height: 1;
  }

  .subtitle {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* ── STATS BAR ── */
  .stats {
    display: flex;
    gap: 12px;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat-box {
    background: var(--bg2);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 8px 20px;
    text-align: center;
    min-width: 110px;
    position: relative;
    overflow: hidden;
  }

  .stat-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-box.cyan::before { background: var(--cyan); box-shadow: var(--glow-cyan); }
  .stat-box.mag::before  { background: var(--magenta); box-shadow: var(--glow-mag); }
  .stat-box.grn::before  { background: var(--green); box-shadow: var(--glow-green); }

  .stat-label {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-top: 2px;
  }
  .stat-box.cyan .stat-value { color: var(--cyan); text-shadow: var(--glow-cyan); }
  .stat-box.mag  .stat-value { color: var(--magenta); text-shadow: var(--glow-mag); }
  .stat-box.grn  .stat-value { color: var(--green); text-shadow: var(--glow-green); }

  /* ── DIFFICULTY ── */
  .difficulty {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .diff-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .diff-btn {
    background: transparent;
    border: 1px solid var(--card-border);
    color: rgba(255,255,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 4px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .diff-btn:hover, .diff-btn.active {
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 8px rgba(0,245,255,0.3);
  }

  .diff-btn.active {
    background: rgba(0,245,255,0.08);
  }

  /* ── BOARD ── */
  #board {
    display: grid;
    gap: 10px;
    width: 100%;
  }

  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-5 { grid-template-columns: repeat(5, 1fr); }
  .grid-6 { grid-template-columns: repeat(6, 1fr); }

  /* ── CARD ── */
  .card {
    aspect-ratio: 1;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Back */
  .card-back-face {
    background: var(--card-back);
    border: 1px solid var(--card-border);
    overflow: hidden;
  }

  .card-back-face::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(45deg, rgba(0,245,255,0.04) 0, rgba(0,245,255,0.04) 1px, transparent 0, transparent 50%),
      repeating-linear-gradient(-45deg, rgba(255,0,200,0.04) 0, rgba(255,0,200,0.04) 1px, transparent 0, transparent 50%);
    background-size: 12px 12px;
  }

  .card-back-face::after {
    content: '?';
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 900;
    color: rgba(0,245,255,0.25);
    position: relative;
    z-index: 1;
  }

  .card:hover:not(.flipped):not(.matched) .card-back-face {
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,245,255,0.25), inset 0 0 20px rgba(0,245,255,0.05);
  }

  /* Front */
  .card-front-face {
    transform: rotateY(180deg);
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    background: #0c1535;
    border: 1px solid #203080;
  }

  .card.matched .card-front-face {
    border-color: var(--green);
    box-shadow: 0 0 14px rgba(0,255,136,0.4), inset 0 0 16px rgba(0,255,136,0.08);
    animation: matchPulse 0.5s ease-out;
  }

  @keyframes matchPulse {
    0%   { transform: rotateY(180deg) scale(1); }
    40%  { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  .card.shake .card-inner {
    animation: shake 0.4s ease;
  }

  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    25%       { transform: rotateY(180deg) translateX(-5px); }
    75%       { transform: rotateY(180deg) translateX(5px); }
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex;
    gap: 12px;
  }

  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), #0088ff);
    color: #000;
    box-shadow: 0 0 20px rgba(0,245,255,0.35);
  }

  .btn-primary:hover {
    box-shadow: 0 0 30px rgba(0,245,255,0.6);
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: rgba(255,255,255,0.5);
    border: 1px solid var(--card-border);
  }

  .btn-secondary:hover {
    border-color: var(--magenta);
    color: var(--magenta);
    box-shadow: 0 0 10px rgba(255,0,200,0.2);
  }

  /* ── VICTORY SCREEN ── */
  #victory {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,6,15,0.92);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 20px;
  }

  #victory.show { display: flex; }

  .victory-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    font-weight: 900;
    background: linear-gradient(90deg, var(--yellow), var(--magenta), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,230,0,0.4));
    animation: victoryPop 0.6s cubic-bezier(0.17, 0.67, 0.3, 1.3) both;
  }

  @keyframes victoryPop {
    from { transform: scale(0.4); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .victory-sub {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .victory-stats {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 8px 0;
  }

  .vs-item {
    background: var(--bg2);
    border: 1px solid var(--card-border);
    padding: 10px 22px;
    border-radius: 6px;
    font-family: 'Orbitron', sans-serif;
  }

  .vs-item span { display: block; }
  .vs-item .lbl { font-size: 0.6rem; color: rgba(255,255,255,0.35); letter-spacing: 0.2em; margin-bottom: 4px; }
  .vs-item .val { font-size: 1.3rem; font-weight: 700; color: var(--yellow); text-shadow: 0 0 10px rgba(255,230,0,0.5); }

  .victory-rating {
    font-size: clamp(2rem, 6vw, 3rem);
    margin: 4px 0;
    animation: float 2s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }

  /* Stars burst */
  .burst {
    position: fixed;
    pointer-events: none;
    font-size: 1.2rem;
    animation: burst 1s ease-out forwards;
    z-index: 300;
  }
  @keyframes burst {
    from { transform: translate(0,0) scale(1); opacity: 1; }
    to   { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
  }
</style>
</head>
<body>

<div class="horizon"></div>

<div class="wrapper">
  <header>
    <div class="logo">NEON MATCH</div>
    <div class="subtitle">Flip · Match · Conquer</div>
  </header>

  <div class="stats">
    <div class="stat-box cyan">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
    <div class="stat-box mag">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat-box grn">
      <div class="stat-label">Pairs</div>
      <div class="stat-value" id="pairs">0 / 8</div>
    </div>
  </div>

  <div class="difficulty">
    <span class="diff-label">Grid:</span>
    <button class="diff-btn active" data-cols="4" data-pairs="8">4×4</button>
    <button class="diff-btn" data-cols="5" data-pairs="10">4×5</button>
    <button class="diff-btn" data-cols="6" data-pairs="18">6×6</button>
  </div>

  <div id="board" class="grid-4"></div>

  <div class="controls">
    <button class="btn btn-primary" id="newGame">New Game</button>
  </div>
</div>

<!-- Victory overlay -->
<div id="victory">
  <div class="victory-title">YOU WIN!</div>
  <div class="victory-sub">Memory Grid Cleared</div>
  <div class="victory-rating" id="victoryRating">⚡</div>
  <div class="victory-stats">
    <div class="vs-item">
      <span class="lbl">Time</span>
      <span class="val" id="vTime">—</span>
    </div>
    <div class="vs-item">
      <span class="lbl">Moves</span>
      <span class="val" id="vMoves">—</span>
    </div>
    <div class="vs-item">
      <span class="lbl">Score</span>
      <span class="val" id="vScore">—</span>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" id="playAgain">Play Again</button>
  </div>
</div>

<script>
const EMOJI_POOL = [
  '🔥','⚡','💎','🌊','🌙','☀️','🎯','🚀',
  '👾','🎮','🧩','🌀','💀','🔮','🎲','🦋',
  '🌈','🍄','🤖','💥','🧬','🌸','🦄','🎸'
];

let cols = 4, totalPairs = 8;
let cards = [], flipped = [], matched = 0, moves = 0;
let timerInterval = null, seconds = 0, canFlip = true;

const board     = document.getElementById('board');
const timerEl   = document.getElementById('timer');
const movesEl   = document.getElementById('moves');
const pairsEl   = document.getElementById('pairs');
const victoryEl = document.getElementById('victory');

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function startTimer() {
  clearInterval(timerInterval);
  seconds = 0;
  timerEl.textContent = '0:00';
  timerInterval = setInterval(() => {
    seconds++;
    timerEl.textContent = formatTime(seconds);
  }, 1000);
}

function stopTimer() { clearInterval(timerInterval); }

function calcScore() {
  const base = totalPairs * 100;
  const timePenalty = Math.floor(seconds / 5) * 5;
  const movePenalty = Math.max(0, moves - totalPairs) * 10;
  return Math.max(0, base - timePenalty - movePenalty);
}

function getRating(score, max) {
  const pct = score / max;
  if (pct >= 0.85) return '⚡⚡⚡ LEGENDARY';
  if (pct >= 0.65) return '🔥🔥 HOT STREAK';
  if (pct >= 0.4)  return '✨ NICE RUN';
  return '💡 KEEP TRAINING';
}

function initGame() {
  stopTimer();
  board.className = `grid-${cols}`;
  victoryEl.classList.remove('show');
  flipped = []; matched = 0; moves = 0; canFlip = true;
  movesEl.textContent = '0';
  pairsEl.textContent = `0 / ${totalPairs}`;
  timerEl.textContent = '0:00';

  const emojis = shuffle([...EMOJI_POOL]).slice(0, totalPairs);
  cards = shuffle([...emojis, ...emojis]);

  board.innerHTML = '';
  cards.forEach((emoji, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.emoji = emoji;
    card.dataset.index = i;
    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back-face"></div>
        <div class="card-face card-front-face">${emoji}</div>
      </div>`;
    card.addEventListener('click', () => onCardClick(card));
    board.appendChild(card);
  });
}

let gameStarted = false;

function onCardClick(card) {
  if (!canFlip) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  if (!gameStarted) { gameStarted = true; startTimer(); }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    movesEl.textContent = moves;
    canFlip = false;
    checkMatch();
  }
}

function checkMatch() {
  const [a, b] = flipped;
  if (a.dataset.emoji === b.dataset.emoji) {
    // Match!
    setTimeout(() => {
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      pairsEl.textContent = `${matched} / ${totalPairs}`;
      flipped = [];
      canFlip = true;
      if (matched === totalPairs) onVictory();
    }, 300);
  } else {
    // No match — shake and flip back
    setTimeout(() => {
      a.classList.add('shake');
      b.classList.add('shake');
      setTimeout(() => {
        a.classList.remove('flipped','shake');
        b.classList.remove('flipped','shake');
        flipped = [];
        canFlip = true;
      }, 420);
    }, 600);
  }
}

function spawnBurst() {
  const icons = ['⭐','✨','💥','🎉','⚡','🌟'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'burst';
    el.textContent = icons[Math.floor(Math.random() * icons.length)];
    const angle = Math.random() * 360;
    const dist  = 80 + Math.random() * 180;
    el.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
    el.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
    el.style.left = `${40 + Math.random() * 20}vw`;
    el.style.top  = `${20 + Math.random() * 60}vh`;
    el.style.animationDelay = `${Math.random() * 0.4}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1200);
  }
}

function onVictory() {
  stopTimer();
  gameStarted = false;
  const score = calcScore();
  const maxScore = totalPairs * 100;
  document.getElementById('vTime').textContent  = formatTime(seconds);
  document.getElementById('vMoves').textContent = moves;
  document.getElementById('vScore').textContent = score;
  document.getElementById('victoryRating').textContent = getRating(score, maxScore);
  victoryEl.classList.add('show');
  spawnBurst();
}

// Difficulty buttons
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    cols = parseInt(btn.dataset.cols);
    totalPairs = parseInt(btn.dataset.pairs);
    gameStarted = false;
    initGame();
  });
});

document.getElementById('newGame').addEventListener('click', () => {
  gameStarted = false;
  initGame();
});

document.getElementById('playAgain').addEventListener('click', () => {
  gameStarted = false;
  initGame();
});

// Boot
initGame();
</script>
</body>
</html>
