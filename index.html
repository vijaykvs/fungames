<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Games - Neon Edition</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0a0e27;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .game-card {
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            width: 250px;
            background-color: rgba(0, 255, 136, 0.1);
            box-shadow: 0 0 15px #00ff88;
            transition: all 0.3s ease;
        }
        .game-card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #00ff88;
            background-color: rgba(0, 255, 136, 0.2);
        }
        .game-card h2 {
            color: #00ff88;
            margin-top: 0;
        }
        .game-card p {
            color: #cccccc;
        }
        .game-link {
            display: inline-block;
            padding: 10px 20px;
            background-color: #00ff88;
            color: #0a0e27;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .game-link:hover {
            background-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>
    <h1>🎮 Fun Games - Neon Edition</h1>
    
    <div class="game-container">
        <div class="game-card">
            <h2>Neon Game</h2>
            <p>Experience the ultimate neon-themed gaming adventure with vibrant colors and futuristic gameplay.</p>
            <a href="neon-game.html" class="game-link">Play Neon Game</a>
        </div>
        
        <div class="game-card">
            <h2>More Games Coming Soon</h2>
            <p>Stay tuned for more exciting games to be added to our collection!</p>
        </div>
    </div>
</body>
</html>
