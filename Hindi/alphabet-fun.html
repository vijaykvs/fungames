<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hindi Alphabet Fun</title>
  <style>
    body{font-family:Arial,sans-serif;background:#fff8f0;color:#333;margin:0;padding:0;}
    .main{max-width:900px;margin:12px auto;padding:14px;background:#fff;border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,0.08);}
    h1{color:#d97706;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:12px;}
    .tile{background:#fefce8;border:2px solid #fde68a;padding:12px;border-radius:10px;text-align:center;}
    .letter{font-size:2rem;font-weight:800;color:#b45309;}
    .pronounce{font-size:.9rem;color:#374151;}
    .actions{margin-top:12px;}
    .btn{display:inline-block;background:#10b981;color:white;padding:8px 12px;border-radius:8px;text-decoration:none;font-weight:bold;}
    .btn:hover{background:#059669;}
  </style>
</head>
<body>
  <div class="main">
    <h1>🅰️ Hindi Alphabet Fun</h1>
    <p>Learn simple letters with colorful cards and playful pronunciation.</p>
    <div class="grid">
      <div class="tile"><div class="letter">अ</div><div class="pronounce">a</div></div>
      <div class="tile"><div class="letter">आ</div><div class="pronounce">aa</div></div>
      <div class="tile"><div class="letter">इ</div><div class="pronounce">i</div></div>
      <div class="tile"><div class="letter">उ</div><div class="pronounce">u</div></div>
      <div class="tile"><div class="letter">क</div><div class="pronounce">ka</div></div>
      <div class="tile"><div class="letter">ग</div><div class="pronounce">ga</div></div>
      <div class="tile"><div class="letter">म</div><div class="pronounce">ma</div></div>
      <div class="tile"><div class="letter">प</div><div class="pronounce">pa</div></div>
    </div>
    <div class="actions"><strong>Game:</strong> Say each sound aloud and clap once for vowels, two times for consonants.</div>
    <div class="actions"><a class="btn" href="index.html">Back to Hindi Home</a> <a class="btn" href="common-verbs.html">Go to Verbs</a></div>
  </div>
</body>
</html>
